services:
  - type: web
    name: ship-ticket-splitter
    runtime: python
    rootDir: webapp
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set manually: use your Gemini API key from Google AI Studio (aistudio.google.com)
      - key: OPENAI_API_BASE
        sync: false   # set manually: https://generativelanguage.googleapis.com/v1beta/openai/
                      # (Decision 13: model switched to gemini-3-flash-preview; requires Google's OpenAI-compat endpoint)
      - key: APP_PASSWORD
        sync: false   # set manually in Render dashboard
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/me
